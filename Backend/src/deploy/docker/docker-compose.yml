services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  main-api:
    build:
      context: ../../../
      dockerfile: src/deploy/docker/Dockerfile.main
    container_name: llm-main-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__main_connection: Server=postgres;Port=5432;Database=llm_app_main_db;User Id=admin;Password=admin;Ssl Mode=Disable;
    ports:
      - "5001:5001"

volumes:
  postgres_data:
